[pytest]
testpaths = tests
pythonpath = .

# --reruns 2: retry flaky tests up to 2 times before marking as failed
# --reruns-delay 3: wait 3 seconds between retries
addopts =
    -v -s
    --alluredir=reports/allure-results
    --reruns 2
    --reruns-delay 3
    --tb=short

markers =
    smoke: Quick sanity tests (under 5 min total) — run before every push
    critical: Must-pass tests — blocking for release
    regression: Full regression suite (all 68 tests)
    slow: Tests taking >2 minutes — skip in fast lanes
    chin36: CHIN36 client-specific tests
    subi79: SUBI79 client-specific tests
    feeforward: Fee Forward (R11) tests
    fetch: Fetch validation (R12) tests
    language: Language dropdown (R13) tests
    netbanking: All netbanking tests
    wallets: All wallet tests
    offline: All offline payment tests
    upi: UPI tests
    cards: Card payment tests
    negative: Negative test cases
    e2e: End-to-end full flow tests
    dynamic: Dynamic per-bank/per-wallet tests
